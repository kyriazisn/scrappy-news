<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Marfin News Tracker</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>Marfin News Tracker</h1>
      <p>Συγκεντρωμένες ειδήσεις από ελληνικά RSS feeds και news sources.</p>
      <div id="meta"></div>
    </header>

    <section class="toolbar">
      <input id="search" type="search" placeholder="Φίλτρο σε τίτλους ή source">
    </section>

    <section>
      <ul id="news-list" class="news-list"></ul>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
